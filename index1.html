<!DOCTYPE html>
<html>
<head>

<title>Chatterbox</title>

<style>

body{
font-family:Arial;
background:#c7d6e3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
background:white;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
overflow:hidden;
}

.header{
background:#5a74e6;
color:white;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* room message */

.roomstatus{
text-align:center;
background:#eef3ff;
padding:6px;
font-size:13px;
color:#444;
border-bottom:1px solid #ddd;
}

/* join inputs */

.top{
padding:10px;
display:flex;
gap:8px;
}

.top input{
flex:1;
padding:8px;
border-radius:15px;
border:1px solid #ccc;
}

.top select{
padding:8px;
border-radius:15px;
}

.top button{
padding:8px 12px;
background:#5a74e6;
border:none;
color:white;
border-radius:15px;
cursor:pointer;
}

/* chat */

.chat{
display:flex;
flex-direction:column;
height:340px;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
background:#f2f4f8;
}

/* message bubbles */

.message{
margin:8px 0;
padding:8px 12px;
border-radius:18px;
font-size:14px;
width:fit-content;
max-width:60%;
word-wrap:break-word;
}

.me{
background:#5a74e6;
color:white;
margin-left:auto;
}

.other{
background:#d9ecff;
color:black;
}

.joinmsg{
text-align:center;
color:#666;
font-style:italic;
font-size:13px;
margin:8px 0;
}

.typing{
font-size:12px;
color:#666;
margin-left:10px;
height:16px;
}

.sendbox{
display:flex;
padding:8px;
gap:8px;
background:white;
}

.sendbox input{
flex:1;
padding:8px;
border-radius:18px;
border:1px solid #ccc;
}

.sendbox button{
padding:6px 14px;
border:none;
background:#5a74e6;
color:white;
border-radius:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
Chatterbox
</div>

<div id="roomStatus" class="roomstatus"></div>

<div class="top">

<input id="username" placeholder="Enter name">

<select id="room">
<option>Infosys</option>
<option>Microsoft</option>
<option>Google</option>
<option>Amazon</option>
<option>TCS</option>
</select>

<button onclick="join()">Join</button>

</div>

<div class="chat">

<div class="messages" id="messages"></div>

<div class="typing" id="typing"></div>

<div class="sendbox">
<input id="msg" placeholder="Type message..." oninput="typing()">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script>

let ws
let username=""
let room=""
let typingTimer

function join(){

username=document.getElementById("username").value
room=document.getElementById("room").value

if(username==="") return

document.getElementById("roomStatus").innerText =
"You joined " + room + " room"

ws=new WebSocket(`ws://localhost:9000/ws/${room}`)

ws.onmessage=(event)=>{

let data=JSON.parse(event.data)

if(data.type==="chat"){

let div=document.createElement("div")

div.classList.add("message")

if(data.user===username){
div.classList.add("me")
}else{
div.classList.add("other")
}

div.innerText=data.user+": "+data.message

document.getElementById("messages").appendChild(div)

}

if(data.type==="join"){

let div=document.createElement("div")
div.classList.add("joinmsg")
div.innerText=data.user+" joined the chat"

document.getElementById("messages").appendChild(div)

}

if(data.type==="leave"){

let div=document.createElement("div")
div.classList.add("joinmsg")
div.innerText=data.user+" left the chat"

document.getElementById("messages").appendChild(div)

}

if(data.type==="typing"){
document.getElementById("typing").innerText=data.user+" is typing..."
}

if(data.type==="stop"){
document.getElementById("typing").innerText=""
}

}

ws.onopen=()=>{
ws.send(JSON.stringify({
type:"join",
user:username
}))
}

}

function send(){

let msg=document.getElementById("msg").value

if(msg==="") return

ws.send(JSON.stringify({
type:"chat",
user:username,
message:msg
}))

ws.send(JSON.stringify({
type:"stop"
}))

document.getElementById("msg").value=""
}

function typing(){

ws.send(JSON.stringify({
type:"typing",
user:username
}))

clearTimeout(typingTimer)

typingTimer=setTimeout(()=>{
ws.send(JSON.stringify({
type:"stop"
}))
},1000)

}

</script>

</body>
</html>
